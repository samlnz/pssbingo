<!DOCTYPE html>
<html>
<head>
    <title>Bingo Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #0f2027;
            color: white;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #00b4d8;
            margin: 0;
        }
        
        .header p {
            color: #90e0ef;
            margin-top: 5px;
        }
        
        .game-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .caller-section {
            flex: 1;
            min-width: 300px;
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #00b4d8;
        }
        
        .current-number {
            font-size: 80px;
            font-weight: bold;
            text-align: center;
            color: #00b4d8;
            text-shadow: 0 0 20px rgba(0,180,216,0.5);
            margin: 20px 0;
        }
        
        .cards-section {
            flex: 1;
            min-width: 300px;
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #4CAF50;
        }
        
        .bingo-card {
            background: #0f3460;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #1a5f7a;
        }
        
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin: 15px 0;
        }
        
        .grid-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        
        .grid-cell.marked {
            background: #4CAF50;
            color: white;
        }
        
        .grid-cell.free {
            background: #ff9e00;
            color: white;
        }
        
        .controls {
            text-align: center;
            margin-top: 30px;
        }
        
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 0 10px;
        }
        
        .btn:hover:not(:disabled) {
            background: #45a049;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .stat-box {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00b4d8;
        }
        
        .status {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Bingo Game</h1>
            <p id="gameStatus">Connecting to server...</p>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="currentNumberDisplay">--</div>
                <div>Current Number</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="numbersCalled">0</div>
                <div>Numbers Called</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="playersOnline">0</div>
                <div>Players Online</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="nextCall">5</div>
                <div>Next in (sec)</div>
            </div>
        </div>
        
        <div class="game-area">
            <div class="caller-section">
                <h2>🎲 Current Number</h2>
                <div class="current-number" id="currentNumber">--</div>
                <div class="status" id="callerStatus">Waiting for game to start...</div>
                
                <h3>Recent Numbers:</h3>
                <div id="recentNumbers" style="
                    display: flex;
                    flex-wrap: wrap;
                    gap: 10px;
                    margin-top: 10px;
                ">
                    <!-- Recent numbers will appear here -->
                </div>
            </div>
            
            <div class="cards-section">
                <h2>🎴 Your Cards</h2>
                <div id="cardsContainer">
                    <div class="status">No cards selected. <a href="choose-cards.html">Choose cards first</a></div>
                </div>
                
                <div class="controls">
                    <button class="btn" id="bingoBtn" disabled>🎉 BINGO!</button>
                    <button class="btn" id="autoMarkBtn">🤖 Auto-Mark: ON</button>
                </div>
            </div>
        </div>
        
        <div class="status" style="text-align: center; margin-top: 20px;">
            <div id="connectionStatus">🔴 Connecting to server...</div>
        </div>
    </div>
    
    <audio id="numberSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3" type="audio/mpeg">
    </audio>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Game state
        const game = {
            socket: null,
            cards: [],
            calledNumbers: new Set(),
            markedNumbers: {},
            isAutoMark: true
        };
        
        // DOM elements
        const gameStatus = document.getElementById('gameStatus');
        const currentNumberDisplay = document.getElementById('currentNumberDisplay');
        const currentNumber = document.getElementById('currentNumber');
        const numbersCalled = document.getElementById('numbersCalled');
        const playersOnline = document.getElementById('playersOnline');
        const nextCall = document.getElementById('nextCall');
        const callerStatus = document.getElementById('callerStatus');
        const recentNumbers = document.getElementById('recentNumbers');
        const cardsContainer = document.getElementById('cardsContainer');
        const bingoBtn = document.getElementById('bingoBtn');
        const autoMarkBtn = document.getElementById('autoMarkBtn');
        const connectionStatus = document.getElementById('connectionStatus');
        const numberSound = document.getElementById('numberSound');
        
        // Initialize
        init();
        
        function init() {
            // Connect to server
            game.socket = io();
            
            // Load player cards from session storage
            loadPlayerCards();
            
            // Setup event listeners
            setupSocketEvents();
            setupButtonEvents();
        }
        
        function loadPlayerCards() {
            try {
                const savedCards = sessionStorage.getItem('selectedCards');
                if (savedCards) {
                    game.cards = JSON.parse(savedCards);
                    displayCards();
                }
            } catch (e) {
                console.log('No cards saved');
            }
        }
        
        function displayCards() {
            cardsContainer.innerHTML = '';
            
            game.cards.forEach((cardNumber, index) => {
                game.markedNumbers[`card${index}`] = new Set();
                
                const cardElement = document.createElement('div');
                cardElement.className = 'bingo-card';
                cardElement.id = `card${index}`;
                
                // Generate card numbers
                const cardNumbers = generateBingoCard(cardNumber);
                
                // Create grid
                let gridHTML = '<div class="bingo-grid">';
                cardNumbers.forEach((num, i) => {
                    const isFree = num === 0;
                    gridHTML += `
                        <div class="grid-cell ${isFree ? 'free marked' : ''}" 
                             data-card="card${index}" 
                             data-number="${isFree ? 'FREE' : num}"
                             onclick="toggleNumber('card${index}', ${isFree ? 'FREE' : num}, this)">
                            ${isFree ? 'FREE' : num}
                        </div>
                    `;
                });
                gridHTML += '</div>';
                
                cardElement.innerHTML = `
                    <h3>Card #${cardNumber}</h3>
                    ${gridHTML}
                    <div style="margin-top: 10px;">
                        Marked: <span id="markedCount${index}">0</span> / 25
                    </div>
                `;
                
                cardsContainer.appendChild(cardElement);
            });
            
            if (game.cards.length > 0) {
                updateBingoButton();
            }
        }
        
        function generateBingoCard(seed) {
            // Simple deterministic card generation
            const numbers = [];
            
            // B column (1-15)
            for (let i = 0; i < 5; i++) {
                numbers.push(((seed * 7 + i) % 15) + 1);
            }
            
            // I column (16-30)
            for (let i = 0; i < 5; i++) {
                numbers.push(((seed * 11 + i) % 15) + 16);
            }
            
            // N column (31-45) - middle is FREE
            for (let i = 0; i < 5; i++) {
                if (i === 2) {
                    numbers.push(0); // FREE
                } else {
                    numbers.push(((seed * 13 + i) % 15) + 31);
                }
            }
            
            // G column (46-60)
            for (let i = 0; i < 5; i++) {
                numbers.push(((seed * 17 + i) % 15) + 46);
            }
            
            // O column (61-75)
            for (let i = 0; i < 5; i++) {
                numbers.push(((seed * 19 + i) % 15) + 61);
            }
            
            return numbers;
        }
        
        function setupSocketEvents() {
            // Connection status
            game.socket.on('connect', () => {
                connectionStatus.innerHTML = '🟢 Connected to server';
                connectionStatus.style.color = '#4CAF50';
            });
            
            game.socket.on('disconnect', () => {
                connectionStatus.innerHTML = '🔴 Disconnected from server';
                connectionStatus.style.color = '#f44336';
            });
            
            // Game state
            game.socket.on('game-state', (data) => {
                console.log('Game state:', data);
                
                if (data.calledNumbers && data.calledNumbers.length > 0) {
                    data.calledNumbers.forEach(num => {
                        game.calledNumbers.add(num);
                        if (game.isAutoMark) {
                            markNumberOnCards(num);
                        }
                    });
                    updateRecentNumbers();
                }
                
                numbersCalled.textContent = data.totalCalled || 0;
                playersOnline.textContent = data.players || 0;
                
                if (data.currentNumber) {
                    currentNumber.textContent = data.currentNumber;
                    currentNumberDisplay.textContent = data.currentNumber;
                }
                
                if (data.phase === 'waiting') {
                    gameStatus.textContent = '⏳ Game starting in 3 seconds...';
                    callerStatus.textContent = '⏳ Game starting soon...';
                } else if (data.phase === 'playing') {
                    gameStatus.textContent = '✅ Game in progress';
                    callerStatus.textContent = '🎲 Numbers being called every 5 seconds';
                } else if (data.phase === 'ended') {
                    gameStatus.textContent = '🏁 Game ended';
                    callerStatus.textContent = '🔄 New game starting in 30 seconds';
                }
            });
            
            // New number called
            game.socket.on('new-number', (data) => {
                console.log('New number:', data);
                
                // Add to called numbers
                game.calledNumbers.add(data.number);
                
                // Update displays
                currentNumber.textContent = data.number;
                currentNumberDisplay.textContent = data.number;
                numbersCalled.textContent = data.totalCalled;
                
                // Play sound
                numberSound.currentTime = 0;
                numberSound.play().catch(e => console.log('Sound error:', e));
                
                // Update recent numbers
                updateRecentNumbers();
                
                // Auto-mark if enabled
                if (game.isAutoMark) {
                    markNumberOnCards(data.number);
                }
                
                // Update next call timer
                startNextCallTimer();
            });
            
            // Player count
            game.socket.on('player-count', (data) => {
                playersOnline.textContent = data.count;
            });
            
            // Winner
            game.socket.on('winner', (data) => {
                alert(`🎉 ${data.playerName} won with card #${data.cardNumber}!`);
                // Save winner data
                sessionStorage.setItem('winner', JSON.stringify(data));
                // Redirect to winner page
                setTimeout(() => {
                    window.location.href = 'winner.html';
                }, 2000);
            });
        }
        
        function startNextCallTimer() {
            let seconds = 5;
            nextCall.textContent = seconds;
            
            const timer = setInterval(() => {
                seconds--;
                nextCall.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    nextCall.textContent = '5';
                }
            }, 1000);
        }
        
        function updateRecentNumbers() {
            recentNumbers.innerHTML = '';
            const recent = Array.from(game.calledNumbers).slice(-10);
            
            recent.forEach(num => {
                const div = document.createElement('div');
                div.textContent = num;
                div.style.cssText = `
                    background: #4CAF50;
                    color: white;
                    padding: 8px 12px;
                    border-radius: 5px;
                    font-weight: bold;
                    min-width: 40px;
                    text-align: center;
                `;
                recentNumbers.appendChild(div);
            });
        }
        
        function markNumberOnCards(number) {
            game.cards.forEach((_, index) => {
                const cardId = `card${index}`;
                const cells = document.querySelectorAll(`#${cardId} .grid-cell[data-number="${number}"]`);
                
                cells.forEach(cell => {
                    if (!cell.classList.contains('marked')) {
                        cell.classList.add('marked');
                        game.markedNumbers[cardId].add(number);
                        updateMarkedCount(index);
                    }
                });
            });
        }
        
        function toggleNumber(cardId, number, element) {
            if (number === 'FREE') return;
            
            if (element.classList.contains('marked')) {
                element.classList.remove('marked');
                game.markedNumbers[cardId].delete(number);
            } else {
                element.classList.add('marked');
                game.markedNumbers[cardId].add(number);
            }
            
            const index = parseInt(cardId.replace('card', ''));
            updateMarkedCount(index);
            updateBingoButton();
        }
        
        function updateMarkedCount(index) {
            const count = game.markedNumbers[`card${index}`]?.size || 0;
            const element = document.getElementById(`markedCount${index}`);
            if (element) {
                element.textContent = count;
            }
        }
        
        function updateBingoButton() {
            let hasWinningLine = false;
            
            // Check each card for winning lines
            game.cards.forEach((_, index) => {
                const cardId = `card${index}`;
                if (checkForBingo(cardId)) {
                    hasWinningLine = true;
                }
            });
            
            bingoBtn.disabled = !hasWinningLine;
        }
        
        function checkForBingo(cardId) {
            // Simple bingo check - just check if any row or column is complete
            // This is a simplified version
            const marked = game.markedNumbers[cardId];
            return marked && marked.size >= 5; // At least 5 numbers marked (excluding FREE)
        }
        
        function setupButtonEvents() {
            bingoBtn.addEventListener('click', () => {
                if (game.cards.length === 0) {
                    alert('Please select cards first!');
                    return;
                }
                
                const playerName = sessionStorage.getItem('playerName') || 'Player';
                const cardNumber = game.cards[0]; // Use first card
                
                game.socket.emit('claim-win', {
                    playerName: playerName,
                    cardNumber: cardNumber
                });
                
                // Save winner data locally
                const winnerData = {
                    playerName: playerName,
                    cardNumber: cardNumber,
                    timestamp: Date.now(),
                    calledNumbers: game.calledNumbers.size
                };
                sessionStorage.setItem('winner', JSON.stringify(winnerData));
            });
            
            autoMarkBtn.addEventListener('click', () => {
                game.isAutoMark = !game.isAutoMark;
                autoMarkBtn.textContent = game.isAutoMark ? '🤖 Auto-Mark: ON' : '🤖 Auto-Mark: OFF';
                autoMarkBtn.style.background = game.isAutoMark ? '#4CAF50' : '#f44336';
            });
        }
        
        // Make toggleNumber available globally
        window.toggleNumber = toggleNumber;
    </script>
</body>
</html>
