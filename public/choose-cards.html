<!DOCTYPE html>
<html>
<head>
    <title>Choose Bingo Cards</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #00b4d8;
            text-align: center;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin: 20px 0;
            max-height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .card-number {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f3460;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .card-number:hover {
            border-color: #00b4d8;
            transform: scale(1.05);
        }
        
        .card-number.selected {
            background: #4CAF50;
            border-color: #45a049;
        }
        
        .card-number.taken {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        
        .selected-cards {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }
        
        .selected-card {
            flex: 1;
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #00b4d8;
        }
        
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            display: inline-block;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        
        .timer {
            font-size: 24px;
            color: #ff9e00;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 Choose Your Bingo Cards</h1>
        <p style="text-align: center;">Select up to 2 cards</p>
        
        <div class="timer" id="timer">Selection Time: 60s</div>
        
        <div class="cards-grid" id="cardsGrid">
            <!-- Cards will be generated here -->
        </div>
        
        <div class="selected-cards">
            <div class="selected-card">
                <h3>Card #1</h3>
                <div id="card1Number" style="font-size: 32px; color: #00b4d8; margin: 10px 0;">--</div>
                <div id="card1Preview" style="
                    display: grid;
                    grid-template-columns: repeat(5, 1fr);
                    gap: 3px;
                    margin-top: 15px;
                ">
                    <!-- Card preview will appear here -->
                </div>
            </div>
            
            <div class="selected-card">
                <h3>Card #2</h3>
                <div id="card2Number" style="font-size: 32px; color: #00b4d8; margin: 10px 0;">--</div>
                <div id="card2Preview" style="
                    display: grid;
                    grid-template-columns: repeat(5, 1fr);
                    gap: 3px;
                    margin-top: 15px;
                ">
                    <!-- Card preview will appear here -->
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn" onclick="randomSelect()">🎲 Random Select</button>
            <button class="btn" onclick="clearSelection()">🗑️ Clear</button>
            <button class="btn" onclick="confirmSelection()" style="background: #00b4d8;">✅ Confirm & Play</button>
        </div>
    </div>
    
    <script>
        // Game state
        const state = {
            selectedCards: [],
            takenCards: new Set(),
            totalCards: 500,
            selectionTime: 60
        };
        
        // DOM elements
        const cardsGrid = document.getElementById('cardsGrid');
        const card1Number = document.getElementById('card1Number');
        const card2Number = document.getElementById('card2Number');
        const card1Preview = document.getElementById('card1Preview');
        const card2Preview = document.getElementById('card2Preview');
        const timer = document.getElementById('timer');
        
        // Initialize
        init();
        
        function init() {
            generateCards();
            startTimer();
            
            // Ask for player name if not set
            if (!sessionStorage.getItem('playerName')) {
                const name = prompt('Enter your name:', 'Player');
                sessionStorage.setItem('playerName', name || 'Player');
            }
        }
        
        function generateCards() {
            cardsGrid.innerHTML = '';
            
            for (let i = 1; i <= state.totalCards; i++) {
                const cardElement = document.createElement('div');
                cardElement.className = 'card-number';
                cardElement.textContent = i;
                cardElement.dataset.number = i;
                
                if (state.takenCards.has(i)) {
                    cardElement.classList.add('taken');
                    cardElement.title = 'Already taken';
                } else {
                    cardElement.addEventListener('click', () => selectCard(i));
                }
                
                cardsGrid.appendChild(cardElement);
            }
        }
        
        function selectCard(number) {
            // Check if already selected
            const index = state.selectedCards.indexOf(number);
            
            if (index > -1) {
                // Deselect
                state.selectedCards.splice(index, 1);
                updateCardElements();
            } else {
                // Check limit
                if (state.selectedCards.length >= 2) {
                    alert('You can only select 2 cards maximum');
                    return;
                }
                
                // Add to selection
                state.selectedCards.push(number);
            }
            
            updateSelectionDisplay();
        }
        
        function updateCardElements() {
            document.querySelectorAll('.card-number').forEach(card => {
                const num = parseInt(card.dataset.number);
                card.classList.remove('selected');
                
                if (state.selectedCards.includes(num)) {
                    card.classList.add('selected');
                }
            });
        }
        
        function updateSelectionDisplay() {
            // Update card numbers
            card1Number.textContent = state.selectedCards[0] || '--';
            card2Number.textContent = state.selectedCards[1] || '--';
            
            // Update previews
            updateCardPreview(1, state.selectedCards[0]);
            updateCardPreview(2, state.selectedCards[1]);
        }
        
        function updateCardPreview(cardIndex, cardNumber) {
            const previewElement = cardIndex === 1 ? card1Preview : card2Preview;
            
            if (!cardNumber) {
                previewElement.innerHTML = '';
                for (let i = 0; i < 25; i++) {
                    const cell = document.createElement('div');
                    cell.style.cssText = `
                        aspect-ratio: 1;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        background: rgba(255,255,255,0.1);
                        border-radius: 3px;
                        font-size: 12px;
                    `;
                    previewElement.appendChild(cell);
                }
                return;
            }
            
            // Generate card numbers
            const cardNumbers = generateBingoCard(cardNumber);
            previewElement.innerHTML = '';
            
            cardNumbers.forEach((num, i) => {
                const cell = document.createElement('div');
                cell.style.cssText = `
                    aspect-ratio: 1;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    background: ${num === 0 ? '#ff9e00' : 'rgba(255,255,255,0.1)'};
                    border-radius: 3px;
                    font-size: 12px;
                    font-weight: ${num === 0 ? 'bold' : 'normal'};
                    color: ${num === 0 ? 'black' : 'white'};
                `;
                cell.textContent = num === 0 ? 'FREE' : num;
                previewElement.appendChild(cell);
            });
        }
        
        function generateBingoCard(seed) {
            const numbers = [];
            
            // Simple deterministic generation
            for (let col = 0; col < 5; col++) {
                for (let row = 0; row < 5; row++) {
                    if (col === 2 && row === 2) {
                        numbers.push(0); // FREE
                    } else {
                        const base = col * 15 + 1;
                        const offset = (seed * 7 + row * 11 + col * 13) % 15;
                        numbers.push(base + offset);
                    }
                }
            }
            
            return numbers;
        }
        
        function randomSelect() {
            state.selectedCards = [];
            
            // Find available cards
            const available = [];
            for (let i = 1; i <= state.totalCards; i++) {
                if (!state.takenCards.has(i)) {
                    available.push(i);
                }
            }
            
            // Shuffle and pick up to 2
            for (let i = available.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [available[i], available[j]] = [available[j], available[i]];
            }
            
            state.selectedCards = available.slice(0, 2);
            
            updateCardElements();
            updateSelectionDisplay();
        }
        
        function clearSelection() {
            state.selectedCards = [];
            updateCardElements();
            updateSelectionDisplay();
        }
        
        function confirmSelection() {
            if (state.selectedCards.length === 0) {
                alert('Please select at least one card!');
                randomSelect();
                return;
            }
            
            // Save cards to session storage
            sessionStorage.setItem('selectedCards', JSON.stringify(state.selectedCards));
            
            // Add to taken cards (in real app, this would be on server)
            state.selectedCards.forEach(card => state.takenCards.add(card));
            
            // Redirect to game page
            window.location.href = 'game.html';
        }
        
        function startTimer() {
            const timerInterval = setInterval(() => {
                state.selectionTime--;
                timer.textContent = `Selection Time: ${state.selectionTime}s`;
                
                if (state.selectionTime <= 10) {
                    timer.style.color = '#ff4b4b';
                }
                
                if (state.selectionTime <= 0) {
                    clearInterval(timerInterval);
                    timer.textContent = 'Time\'s up!';
                    
                    // Auto-select if no cards chosen
                    if (state.selectedCards.length === 0) {
                        randomSelect();
                        setTimeout(confirmSelection, 1000);
                    } else {
                        confirmSelection();
                    }
                }
            }, 1000);
        }
    </script>
</body>
</html>
