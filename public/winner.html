<!DOCTYPE html>
<html>
<head>
    <title>BINGO WINNER!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        
        .winner-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            border: 5px solid #FFD700;
            position: relative;
            z-index: 10;
        }
        
        .trophy {
            font-size: 80px;
            color: #FFD700;
            animation: bounce 1s infinite alternate;
        }
        
        h1 {
            color: #FFD700;
            font-size: 48px;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .winner-name {
            font-size: 32px;
            color: #4CAF50;
            margin: 20px 0;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            min-width: 120px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00b4d8;
        }
        
        .countdown {
            margin-top: 30px;
            font-size: 18px;
            color: #90e0ef;
        }
        
        .countdown-number {
            font-size: 24px;
            color: #FFD700;
            font-weight: bold;
        }
        
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 20px;
            background: var(--color);
            top: -20px;
            animation: fall 3s linear infinite;
        }
        
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="confetti"></div>
    
    <div class="winner-container">
        <div class="trophy">🏆</div>
        <h1>BINGO VICTORY!</h1>
        
        <div class="winner-name" id="winnerName">Loading...</div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="cardNumber">--</div>
                <div>Winning Card</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="numbersCalled">0</div>
                <div>Numbers Called</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="winTime">00:00</div>
                <div>Game Time</div>
            </div>
        </div>
        
        <p style="margin: 30px 0; font-size: 18px; color: #90e0ef;">
            Congratulations! You completed a BINGO line!
        </p>
        
        <div class="countdown">
            Returning to card selection in 
            <span class="countdown-number" id="countdown">10</span> seconds...
        </div>
    </div>
    
    <audio id="winSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        // Load winner data
        const winnerData = JSON.parse(sessionStorage.getItem('winner') || '{}');
        
        // Update display
        document.getElementById('winnerName').textContent = winnerData.playerName || 'Player';
        document.getElementById('cardNumber').textContent = winnerData.cardNumber || '--';
        document.getElementById('numbersCalled').textContent = winnerData.calledNumbers || 0;
        
        // Calculate game time
        if (winnerData.timestamp) {
            const time = Math.floor((winnerData.timestamp - (winnerData.timestamp - 30000)) / 1000);
            const minutes = Math.floor(time / 60);
            const seconds = time % 60;
            document.getElementById('winTime').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // Create confetti
        function createConfetti() {
            const colors = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF'];
            const container = document.getElementById('confetti');
            
            for (let i = 0; i < 150; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti';
                piece.style.cssText = `
                    left: ${Math.random() * 100}%;
                    --color: ${colors[Math.floor(Math.random() * colors.length)]};
                    animation-delay: ${Math.random() * 3}s;
                    width: ${Math.random() * 10 + 5}px;
                    height: ${Math.random() * 15 + 10}px;
                `;
                container.appendChild(piece);
            }
        }
        
        // Play win sound
        function playWinSound() {
            const audio = document.getElementById('winSound');
            audio.volume = 0.6;
            audio.play().catch(e => console.log('Sound error:', e));
        }
        
        // Countdown
        function startCountdown() {
            let count = 10;
            const countdownElement = document.getElementById('countdown');
            
            const timer = setInterval(() => {
                count--;
                countdownElement.textContent = count;
                
                if (count <= 3) {
                    countdownElement.style.color = '#ff4b4b';
                }
                
                if (count <= 0) {
                    clearInterval(timer);
                    window.location.href = 'choose-cards.html';
                }
            }, 1000);
        }
        
        // Initialize
        window.onload = function() {
            createConfetti();
            playWinSound();
            startCountdown();
            
            // Clear winner data after viewing
            setTimeout(() => {
                sessionStorage.removeItem('winner');
            }, 5000);
        };
    </script>
</body>
</html>
